<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UnMuteMe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      padding: 16px;
      color: #1f1f1f;
    }
    h1 {
      font-size: 15px;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #666;
      font-size: 12px;
      margin-bottom: 16px;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.2s;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider { background: #1a73e8; }
    input:checked + .slider:before { transform: translateX(18px); }
  </style>
</head>
<body>
  <h1>UnMuteMe</h1>
  <p class="subtitle">Detects when you speak while muted and unmutes you automatically.</p>

  <div class="toggle-row">
    <span>Enabled</span>
    <label class="switch">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
